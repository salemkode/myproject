{% extends 'store/base.html' %}

{% block title %}{{ customer.name }} - Store{% endblock %}

{% block content %}
<h1>{{ customer.name }}</h1>
<p><strong>Phone:</strong> {{ customer.phone_number }}</p>

<div class="actions">
    <a href="{% url 'customer-update' customer.id %}">Edit</a>
    <a href="{% url 'customer-delete' customer.id %}" class="btn-delete">Delete</a>
    <a href="{% url 'customer-list' %}">Back to Customers</a>
</div>
{% endblock %}
